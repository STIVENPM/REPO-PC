<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito ST</title>
    <link rel="stylesheet" href="style.css">
</head>

<!-- Problema 4: Carrito de compras en una tienda en línea
Una tienda virtual quiere implementar un carrito de compras para sus clientes.

Los usuarios deben poder agregar diferentes productos al carrito, eliminar productos si lo desean y
ver el valor total de la compra antes de realizar el pago.
Cada producto tiene información básica como nombre y precio. El sistema debe actualizar
automáticamente el total cuando se agregan o eliminan productos.
-->

<body>
    <header>
        <h1>Carrito ST</h1>
    </header>

    <main>
        <section class="contenedor">
            <h2>Agregar producto</h2>

            <form id="productForm">
                <label for="nombreProducto">Nombre del producto:</label>
                <input type="text" id="nombreProducto" placeholder="Ingrese el nombre del producto">

                <label for="precioProducto">Precio del producto:</label>
                <input type="number" id="precioProducto" placeholder="Ingrese el precio del producto">

                <button type="submit">Agregar al carrito</button>
            </form>

            <p id="resultadoAgregar"></p>
        </section>

        <section class="contenedor">
            <h2>Productos en el carrito</h2>

            <select id="listaProductos" size="8">
                <option value="">No hay productos agregados</option>
            </select>

            <button type="button" id="eliminarProducto">Eliminar producto seleccionado</button>

            <h2>Total de la compra</h2>
            <p id="totalCompra">$0</p>

            <p id="resultadoEliminar"></p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
